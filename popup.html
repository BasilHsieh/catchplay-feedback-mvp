<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CATCHPLAY Feedback</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="title-row">
          <h1>CATCHPLAY Feedback</h1>
          <span id="extensionVersion" class="version-badge" aria-label="Extension version"></span>
        </div>
        <p class="subtitle">Recommendation feedback MVP</p>
      </header>

      <div class="switch-row switch-row--master">
        <span class="switch-label">啟用 Extension</span>
        <label class="switch">
          <input id="enabled" type="checkbox">
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>

      <label class="field">
        <span>你是誰？</span>
        <input id="userName" type="text" autocomplete="off" placeholder="想留個名字嗎？選填">
      </label>

      <div class="switch-row">
        <span class="switch-label">開發者模式</span>
        <label class="switch">
          <input id="devMode" type="checkbox">
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>

      <section id="devSection" class="dev-section" hidden>
        <label class="field">
          <span>Apps Script URL</span>
          <input id="endpointUrl" type="url" placeholder="https://script.google.com/...">
        </label>

        <div class="switch-row">
          <span class="switch-label">頁面顯示偵測到的卡片</span>
          <label class="switch">
            <input id="debugMode" type="checkbox">
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </label>
        </div>

        <button id="scanPage" class="secondary" type="button">Scan current page</button>
        <button id="downloadScan" class="secondary" type="button" disabled>Download scan JSON</button>
        <textarea id="scanOutput" class="scan-output" readonly placeholder="Page scan JSON will appear here."></textarea>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
